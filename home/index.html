<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kieron's Code Cabin</title>

<style>
body{
    background:black;
    color:#00ff00;
    font-family:"Courier New", monospace;
    text-align:center;
    margin:0;
}

.wrapper{
    max-width:800px;
    margin:20px auto;
    padding:20px;
    border:4px solid #ff00ff;
}

header h1,
header h2{
    color:#ff00ff;
    text-transform:uppercase;
    margin:10px 0;
}

/* Photo strip */
.photo-strip{
    display:flex;
    justify-content:center;
    gap:0;
    margin:20px auto;
    flex-wrap:nowrap;
    border:2px solid #ff00ff;
    width:fit-content;
}

.photo-strip img{
    width:90px;
    height:90px;
    object-fit:cover;
    display:block;
    border-right:2px solid #ff00ff;
}

.photo-strip img:last-child{
    border-right:none;
}

/* Make the photo strip smaller on phones */
@media screen and (max-width:480px){

    .photo-strip img{
        width:80px;
        height:80px;
    }

}

/* Navigation */

nav ul{
    list-style:none;
    padding:0;
    margin:25px 0;
}

nav li{
    display:inline-block;
    margin:0 18px;
}

nav a{
    color:#00ff00;
    text-decoration:none;
}

nav a:hover{
    color:#ffff00;
}

/* Main */

main h2{
    color:#ff0000;
    text-transform:uppercase;
}

main p{
    max-width:550px;
    margin:15px auto;
}

/* Main picture */

.profile-pic{
    width:112px;
    height:112px;
    object-fit:cover;
    border:4px solid #ff00ff;
    margin-top:25px;
}

footer{
    margin-top:40px;
    padding-top:15px;
    border-top:2px solid #00ffff;
    color:#00ffff;
}

</style>

</head>

<body>

<div class="wrapper">

<header>

<h1>Kieron's Webpage</h1>

<div class="photo-strip">
    <img src="/images/bmx.JPG" alt="Old photo 1">
    <img src="/images/IMG_4950.JPG" alt="Old photo 2">
    <img src="/images/IMG_4953.JPG" alt="Old photo 3">
    <img src="/images/IMG_5016.JPG" alt="Old photo 4">
</div>

<h2>404: Neurotypical.exe not found.</h2>

</header>

<nav>
<ul>
    <li><a href="/" class="active">HOME</a></li>
    <li><a href="/aboutmepage/">ABOUT ME</a></li>
    <li><a href="/snakeGame/">SNAKE GAME</a></li>
</ul>
</nav>

<main>

<h2>Welcome to my page!</h2>

<p>
This website used to be my project. I decided to keep a couple of pages
live. I revisit it now and then as a distraction.
</p>

<img class="profile-pic"
     src="/images/kieronpi.jpg"
     alt="Kieron working on a Raspberry Pi">

</main>

<footer>
<p>&copy; 2024 My Website</p>
</footer>

</div>

</body>
</html>
